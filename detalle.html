<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detalle</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f3f3;
padding:14px;
}

.btn-regresar{
width:100%;
max-width:170px;
padding:11px;
border-radius:14px;
background:white;
border:3px solid #056b1f;
font-size:14px;
font-weight:bold;
color:#056b1f;
margin-bottom:14px;
}

.tarjeta{
background:white;
border-radius:18px;
padding:16px;
}

.imagen{
width:100%;
height:220px;
background:#ddd;
border-radius:14px;
margin-bottom:14px;
overflow:hidden;
}

.imagen img{
width:100%;
height:100%;
object-fit:cover;
}

.titulo{
font-size:20px;
font-weight:bold;
color:#056b1f;
margin-bottom:10px;
}

.precio{
font-size:22px;
font-weight:bold;
color:#d4af37;
margin-bottom:14px;
}

.seccion{
margin-bottom:16px;
}

.seccion h3{
font-size:15px;
margin-bottom:7px;
color:#056b1f;
}

.seccion p{
font-size:14px;
color:#444;
line-height:1.5;
}

.contacto{
background:#f5f5f5;
padding:12px;
border-radius:12px;
font-size:15px;
font-weight:bold;
}

.fecha{
font-size:12px;
color:#888;
margin-top:10px;
}

.cargando{
text-align:center;
padding:40px;
font-size:15px;
color:#777;
}

</style>
</head>
<body>

<button class="btn-regresar"
onclick="window.location.href='index.html'">
← Regresar
</button>

<div id="cargando" class="cargando">
Cargando información...
</div>

<div id="contenido" style="display:none;">

<div class="tarjeta">

<div class="imagen">
<img id="imagenProducto"
src="https://via.placeholder.com/400x250?text=Producto">
</div>

<div class="titulo" id="titulo"></div>

<div class="precio" id="precio"></div>

<div class="seccion">
<h3>📋 Descripción</h3>
<p id="descripcion"></p>
</div>

<div class="seccion">
<h3>📞 Contacto</h3>
<div class="contacto" id="contacto"></div>
</div>

<div class="fecha" id="fecha"></div>

</div>

</div>

<script>

const firebaseConfig = {
apiKey:"TU_API_KEY",
authDomain:"TU_DOMINIO.firebaseapp.com",
databaseURL:"https://TU_URL_DATABASE.firebaseio.com",
projectId:"TU_ID_PROYECTO",
storageBucket:"TU_BUCKET.appspot.com",
messagingSenderId:"TU_SENDER_ID",
appId:"TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const parametros = new URLSearchParams(window.location.search);

const id = parametros.get('id');

db.ref('publicaciones/' + id).once('value')
.then((datos)=>{

const producto = datos.val();

document.getElementById('cargando').style.display='none';

document.getElementById('contenido').style.display='block';

document.getElementById('titulo').textContent =
producto.titulo;

document.getElementById('precio').textContent =
'$' + producto.valor;

document.getElementById('descripcion').textContent =
producto.caracteristicas;

document.getElementById('contacto').textContent =
producto.contacto;

document.getElementById('fecha').textContent =
'Publicado: ' +
new Date(producto.fecha).toLocaleDateString('es-CO');

if(producto.imagen){

document.getElementById('imagenProducto').src =
producto.imagen;

}

});

</script>

</body>
</html>
