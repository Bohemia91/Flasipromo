<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Producto</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_DOMINIO.firebaseapp.com",
            databaseURL: "https://TU_URL_DATABASE.firebaseio.com",
            projectId: "TU_ID_PROYECTO",
            storageBucket: "TU_BUCKET.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
</head>
<body>

<button onclick="window.location.href='index.html'">Regresar</button>

<h1 id="titulo"></h1>
<p id="descripcion"></p>
<h2 id="precio"></h2>
<p id="contacto"></p>
<p id="fecha"></p>

<script>

const parametrosUrl = new URLSearchParams(window.location.search);
const idProducto = parametrosUrl.get('id');

if (idProducto) {

    db.ref('publicaciones/' + idProducto).once('value')
    .then((snapshot) => {

        if (snapshot.exists()) {

            const producto = snapshot.val();

            document.getElementById('titulo').textContent = producto.titulo;
            document.getElementById('descripcion').textContent = producto.caracteristicas;
            document.getElementById('precio').textContent = '$' + producto.valor;
            document.getElementById('contacto').textContent = 'Contacto: ' + producto.contacto;
            document.getElementById('fecha').textContent = new Date(producto.fecha).toLocaleDateString('es-CO');

        } else {
            document.body.innerHTML = '<h1>Producto no encontrado</h1>';
        }
    })
    .catch((error) => {
        alert(error.message);
    });
}

</script>

</body>
</html>
