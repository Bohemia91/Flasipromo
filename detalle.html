    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
        body {background-color: #f5f5f5; line-height: 1.6; padding: 2rem 1rem;}

        .contenedor-principal {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .boton-regresar {
            background-color: #0A5F26;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 2rem;
            text-decoration: none;
            display: inline-block;
        }
        .boton-regresar:hover {background-color: #084D1E;}

        .imagen-principal {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 2rem;
            border: 1px solid #eee;
        }
        .imagen-principal img {width: 100%; height: 100%; object-fit: cover;}

        .informacion h1 {color: #0A5F26; font-size: 1.8rem; margin-bottom: 1rem;}
        .categoria {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background-color: #0A5F26;
            color: white;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }
        .precio {font-size: 2rem; color: #D4AF37; font-weight: bold; margin-bottom: 1.5rem;}
        .seccion {margin-bottom: 1.5rem;}
        .seccion h3 {color: #0A5F26; font-size: 1.2rem; margin-bottom: 0.8rem;}
        .contacto {
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid #0A5F26;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .cargando {text-align:center; padding:3rem; color:#888; font-size:1.1rem;}

        @media (max-width: 768px) {
            .imagen-principal {height: 250px;}
            .informacion h1 {font-size: 1.4rem;}
            .precio {font-size: 1.5rem;}
        }
    </style>
</head>
<body>
    <div class="contenedor-principal">
        <button class="boton-regresar" onclick="window.close();">← Regresar</button>

        <div id="cargando" class="cargando">Cargando información...</div>

        <div id="contenido" style="display:none;">
            <div class="imagen-principal">
                <img id="imagenProducto" src="" alt="Imagen del producto">
            </div>

            <div class="informacion">
                <h1 id="tituloProducto"></h1>
                <div class="categoria" id="nombreCategoria"></div>
                <div class="precio" id="precioProducto"></div>

                <div class="seccion">
                    <h3>📋 Descripción y detalles</h3>
                    <p id="descripcionProducto"></p>
                </div>

                <div class="seccion">
                    <h3>📞 Contacto del vendedor</h3>
                    <div class="contacto" id="contactoProducto"></div>
                </div>

                <div class="seccion">
                    <small style="color:#888;">Publicado el: <span id="fechaProducto"></span></small>
                </div>
            </div>
        </div>
    </div>
