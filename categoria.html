<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Categoría</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f3f3;
}

.encabezado{
background:#056b1f;
padding:14px;
}

.btn-regresar{
width:100%;
max-width:170px;
padding:11px;
border-radius:14px;
background:white;
border:3px solid #056b1f;
font-size:14px;
font-weight:bold;
color:#056b1f;
margin-bottom:12px;
}

.buscador{
background:white;
padding:12px;
border-radius:14px;
display:flex;
align-items:center;
gap:10px;
}

.buscador input{
border:none;
outline:none;
width:100%;
font-size:14px;
}

.lista{
padding:14px;
display:flex;
flex-direction:column;
gap:12px;
}

.tarjeta{
background:white;
padding:14px;
border-radius:16px;
}

.tarjeta h3{
font-size:16px;
margin-bottom:8px;
color:#056b1f;
}

.tarjeta p{
font-size:13px;
margin-bottom:8px;
}

.precio{
font-size:17px;
font-weight:bold;
color:#d4af37;
}

.btn-detalle{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#056b1f;
color:white;
font-weight:bold;
}

.vacio{
text-align:center;
color:#666;
margin-top:50px;
padding:20px;
}

</style>
</head>
<body>

<div class="encabezado">

<button class="btn-regresar"
onclick="window.location.href='index.html'">
← Regresar
</button>

<div class="buscador">
<span>🔍</span>

<input type="text"
id="busqueda"
placeholder="Buscar productos...">
</div>

</div>

<div class="lista" id="listaProductos"></div>

<div class="vacio" id="mensajeVacio" style="display:none;">
<h3>😕 Todavía no hay anuncios en esta categoría</h3>
</div>

<script>

// ✅ TUS DATOS REALES DE FIREBASE (YA LOS PUSE YO)
const firebaseConfig = {
apiKey:"AIzaSyDy3wNIh44yWvQ0taoC-I1MiiLj9a77zpY",
authDomain:"flasipromo.firebaseapp.com",
databaseURL:"https://flasipromo-default-rtdb.firebaseio.com",
projectId:"flasipromo",
storageBucket:"flasipromo.appspot.com",
messagingSenderId:"439920052201",
appId:"1:439920052201:ddf170b3be99b732cced78"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const parametros = new URLSearchParams(window.location.search);
const categoria = parametros.get('categoria'); // ej: "nuevos", "segunda", "servicios"

const lista = document.getElementById('listaProductos');
const mensajeVacio = document.getElementById('mensajeVacio');
const buscador = document.getElementById('busqueda');

let productos = [];

function renderizar(listaProductos){

lista.innerHTML='';
mensajeVacio.style.display = 'none';

if(listaProductos.length === 0){
mensajeVacio.style.display = 'block';
return;
}

listaProductos.forEach(producto=>{

const tarjeta=document.createElement('div');
tarjeta.className='tarjeta';

tarjeta.innerHTML=`
<h3>${producto.titulo || 'Sin título'}</h3>
<p>${producto.descripcion || 'Sin descripción'}</p>
<div class="precio">$${producto.valor || '0'}</div>
<p><strong>Contacto:</strong> ${producto.contacto || 'Sin dato'}</p>

<button class="btn-detalle"
onclick="verDetalle('${producto.id}')">
Ver detalles
</button>
`;

lista.appendChild(tarjeta);

});

}

function verDetalle(id){
alert("Aquí iría la página de detalles con el ID: " + id);
// cuando quieras, creamos el archivo detalle.html
}

// ✅ CORREGIDO: LEEMOS DE DONDE SE ESTÁN GUARDANDO LOS DATOS
db.ref('ofertas/' + categoria).on('value',(datos)=>{

productos=[];

if(datos.exists()){

datos.forEach((hijo)=>{

const producto=hijo.val();
producto.id=hijo.key;

// ✅ Ya no filtramos por fechaExpiracion porque no lo usamos
productos.push(producto);

});

// Ordenamos del más nuevo al más viejo
productos.sort((a,b) => b.fecha - a.fecha);

}

renderizar(productos);

});

buscador.addEventListener('input',()=>{

const texto=buscador.value.toLowerCase();
const filtrados=productos.filter(producto=>
(producto.titulo || "").toLowerCase().includes(texto)
);

renderizar(filtrados);

});

</script>

</body>
</html>
