<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoría</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_DOMINIO.firebaseapp.com",
            databaseURL: "https://TU_URL_DATABASE.firebaseio.com",
            projectId: "TU_ID_PROYECTO",
            storageBucket: "TU_BUCKET.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
</head>
<body>

<button onclick="window.location.href='index.html'">Regresar</button>

<h1 id="tituloCategoria"></h1>

<div id="listaProductos"></div>

<script>

const parametrosUrl = new URLSearchParams(window.location.search);
const categoriaSeleccionada = parametrosUrl.get('categoria');

const titulo = document.getElementById('tituloCategoria');

titulo.textContent = categoriaSeleccionada;

const lista = document.getElementById('listaProductos');


db.ref('publicaciones').on('value', (datos) => {

    lista.innerHTML = '';

    datos.forEach((hijo) => {

        const producto = hijo.val();
        producto.id = hijo.key;

        if (producto.categoria === categoriaSeleccionada) {

            const tarjeta = document.createElement('div');

            tarjeta.innerHTML = `
                <hr>
                <h2>${producto.titulo}</h2>
                <p>${producto.caracteristicas}</p>
                <p><strong>$${producto.valor}</strong></p>
                <button onclick="abrirDetalle('${producto.id}')">Ver detalles</button>
            `;

            lista.appendChild(tarjeta);
        }
    });
});

function abrirDetalle(id) {
    window.location.href = `detalle.html?id=${id}`;
}

</script>

</body>
</html>
