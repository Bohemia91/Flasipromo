<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas Santa Rosa de Osos</title>

    <!-- FIREBASE COMPAT -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_DOMINIO.firebaseapp.com",
            databaseURL: "https://TU_URL_DATABASE.firebaseio.com",
            projectId: "TU_ID_PROYECTO",
            storageBucket: "TU_BUCKET.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);

        const db = firebase.database();
        const auth = firebase.auth();
    </script>
</head>
<body>

<h1>Ofertas Santa Rosa de Osos</h1>

<button onclick="abrirEnNuevaPestana('categoria.html?categoria=nuevos')">Productos nuevos</button>
<button onclick="abrirEnNuevaPestana('categoria.html?categoria=segunda')">Productos segunda</button>
<button onclick="abrirEnNuevaPestana('categoria.html?categoria=servicios')">Servicios</button>
<button onclick="accionPublicar()">Publicar oferta</button>

<div id="mensajeAcceso" style="display:none; color:red;">
Debes iniciar sesión
</div>

<hr>

<h2>Acceso</h2>

<input type="email" id="loginEmail" placeholder="Correo">
<input type="password" id="loginPass" placeholder="Contraseña">
<button onclick="iniciarSesion()">Entrar</button>

<hr>

<h2>Registro</h2>

<input type="text" id="regNombre" placeholder="Nombre">
<input type="email" id="regEmail" placeholder="Correo">
<input type="password" id="regPass" placeholder="Contraseña">
<button onclick="registrarUsuario()">Crear cuenta</button>

<hr>

<div id="formularioPublicar" style="display:none;">
    <input type="text" id="titulo" placeholder="Título">
    <textarea id="caracteristicas" placeholder="Descripción"></textarea>
    <input type="number" id="valor" placeholder="Precio">
    <input type="text" id="contacto" placeholder="Contacto">

    <select id="categoria">
        <option value="nuevos">Nuevos</option>
        <option value="segunda">Segunda</option>
        <option value="servicios">Servicios</option>
    </select>

    <button onclick="publicarOferta()">Publicar</button>
</div>

<script>

let usuarioActual = null;

function abrirEnNuevaPestana(url) {
    window.location.href = url;
}

function accionPublicar() {
    if (usuarioActual) {
        document.getElementById('formularioPublicar').style.display = 'block';
    } else {
        document.getElementById('mensajeAcceso').style.display = 'block';
    }
}

function registrarUsuario() {

    const email = document.getElementById('regEmail').value;
    const pass = document.getElementById('regPass').value;

    auth.createUserWithEmailAndPassword(email, pass)
    .then(() => {
        alert('✅ Cuenta creada correctamente');
    })
    .catch((error) => {
        alert(error.message);
    });
}

function iniciarSesion() {

    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;

    auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
        alert('✅ Sesión iniciada');
    })
    .catch((error) => {
        alert(error.message);
    });
}

function publicarOferta() {

    const titulo = document.getElementById('titulo').value;
    const caracteristicas = document.getElementById('caracteristicas').value;
    const valor = document.getElementById('valor').value;
    const contacto = document.getElementById('contacto').value;
    const categoria = document.getElementById('categoria').value;

    db.ref('publicaciones').push({
        titulo,
        caracteristicas,
        valor,
        contacto,
        categoria,
        fecha: Date.now()
    })
    .then(() => {
        alert('✅ Publicación creada');
    })
    .catch((error) => {
        alert(error.message);
    });
}

function cerrarSesion() {
    auth.signOut();
}

auth.onAuthStateChanged((usuario) => {

    if (usuario) {
        usuarioActual = usuario;
        console.log('Usuario conectado');
    } else {
        usuarioActual = null;
        console.log('Sin sesión');
    }
});

</script>

</body>
</html>
