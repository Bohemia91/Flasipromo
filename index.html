<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas Santa Rosa de Osos</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js"></script>
    <script>
        // CONFIGURACIÓN DE TU PROYECTO FIREBASE
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_DOMINIO.firebaseapp.com",
            databaseURL: "https://TU_URL_DATABASE.firebaseio.com",
            projectId: "TU_ID_PROYECTO",
            storageBucket: "TU_BUCKET.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
    </script>
    <!-- LLAMAMOS AL ARCHIVO DE ESTILOS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="encabezado">
        <h1>Ofertas Santa Rosa de Osos</h1>
        <p>Lo mejor en productos y servicios, cerca de ti</p>
        <div class="usuario-info" id="seccionUsuario">
            <span id="nombreUsuario" style="display: none;"></span>
            <button class="btn-sesion btn-login" id="btnAbrirAcceso" onclick="abrirModalAcceso()">Iniciar Sesión</button>
            <button class="btn-sesion btn-logout" id="btnCerrarSesion" onclick="cerrarSesion()" style="display: none;">Cerrar Sesión</button>
        </div>
    </header>

    <nav class="menu-principal">
        <button class="boton-menu" onclick="abrirEnNuevaPestana('categoria.html?categoria=nuevos')">✨ Productos nuevos</button>
        <button class="boton-menu" onclick="abrirEnNuevaPestana('categoria.html?categoria=segunda')">♻️ Productos de segunda</button>
        <button class="boton-menu" onclick="abrirEnNuevaPestana('categoria.html?categoria=servicios')">🔧 Servicios</button>
        <button class="boton-publicar-oferta" onclick="accionPublicar()">📝 Publicar oferta</button>
    </nav>

    <div class="mensaje-acceso" id="mensajeAcceso">Para poder publicar una oferta debes iniciar sesión o registrarte</div>

    <!-- MODAL PUBLICAR -->
    <div id="modalPublicar" class="modal">
        <div class="modal-contenido">
            <span class="cerrar-modal" onclick="cerrarModal()">&times;</span>
            <h2>📝 Publica tu oferta</h2>
            <form class="formulario-publicacion">
                <div class="campo-formulario">
                    <label for="titulo">Nombre del artículo / Título *</label>
                    <input type="text" id="titulo" required>
                </div>
                <div class="campo-formulario">
                    <label for="caracteristicas">Características / Detalles *</label>
                    <textarea id="caracteristicas" required></textarea>
                </div>
                <div class="campo-formulario">
                    <label for="valor">Valor (COP) *</label>
                    <input type="number" id="valor" min="1" required>
                    <div id="mensajeErrorValor" class="mensaje-error">⚠️ No se aceptan números repetidos o cero</div>
                </div>
                <div class="campo-formulario">
                    <label for="foto">Foto del producto *</label>
                    <input type="file" id="foto" accept="image/*" required>
                </div>
                <div class="campo-formulario">
                    <label for="contacto">Número de contacto *</label>
                    <input type="tel" id="contacto" required>
                </div>
                <div class="campo-formulario">
                    <label for="categoria">Categoría *</label>
                    <select id="categoria" required>
                        <option value="">Selecciona</option>
                        <option value="nuevos">✨ Productos nuevos</option>
                        <option value="segunda">♻️ Productos de segunda</option>
                        <option value="servicios">🔧 Servicios</option>
                    </select>
                </div>
                <button type="button" class="boton-enviar" onclick="publicarOferta()">Publicar ahora</button>
                <div id="mensajeExito" class="mensaje-exito" style="text-align: center;">✅ Publicación creada correctamente</div>
            </form>
        </div>
    </div>

    <!-- MODAL ACCESO -->
    <div id="modalAcceso" class="modal">
        <div class="modal-contenido">
            <span class="cerrar-modal" onclick="cerrarModalAcceso()">&times;</span>
            <h2>👤 Acceso Usuarios</h2>
            <div class="pestanas-acceso">
                <div class="pestana-acceso activa" onclick="cambiarPestana('login')">Iniciar Sesión</div>
                <div class="pestana-acceso" onclick="cambiarPestana('registro')">Registrarse</div>
            </div>
            <div class="contenido-acceso activo" id="contenidoLogin">
                <div class="campo-formulario">
                    <label>Correo Electrónico</label>
                    <input type="email" id="loginEmail">
                </div>
                <div class="campo-formulario">
                    <label>Contraseña</label>
                    <input type="password" id="loginPass">
                </div>
                <button type="button" class="boton-enviar" onclick="iniciarSesion()">Entrar</button>
            </div>
            <div class="contenido-acceso" id="contenidoRegistro">
                <div class="campo-formulario">
                    <label>Nombre Completo</label>
                    <input type="text" id="regNombre">
                </div>
                <div class="campo-formulario">
                    <label>Correo Electrónico</label>
                    <input type="email" id="regEmail">
                </div>
                <div class="campo-formulario">
                    <label>Contraseña (mínimo 6 caracteres)</label>
                    <input type="password" id="regPass">
                </div>
                <button type="button" class="boton-enviar" onclick="registrarUsuario()">Crear Cuenta</button>
            </div>
            <div id="mensajeAccesoError" class="mensaje-error"></div>
        </div>
    </div>

    <script>
        let usuarioActual = null;

        // --- FUNCIONES GENERALES ---
        function abrirEnNuevaPestana(url) { window.open(url, '_blank'); }
        function accionPublicar() {
            if (usuarioActual) abrirModal();
            else {
                document.getElementById('mensajeAcceso').style.display = 'block';
                setTimeout(() => document.getElementById('mensajeAcceso').style.display = 'none', 3000);
            }
        }
        function abrirModal() { document.getElementById('modalPublicar').style.display = 'block'; }
        function cerrarModal() { document.getElementById('modalPublicar').style.display = 'none'; }
        function abrirModalAcceso() { document.getElementById('modalAcceso').style.display = 'block'; }
        function cerrarModalAcceso() { document.getElementById('modalAcceso').style.display = 'none'; }
        function cambiarPestana(tipo) {
            if(tipo === 'login'){
                document.querySelector('.pestana-acceso').classList.add('activa');
                document.querySelectorAll('.pestana-acceso')[1].classList.remove('activa');
                document.getElementById('contenidoLogin').classList.add('activo');
                document.getElementById('contenidoRegistro').classList.remove('activo');
            } else {
                document.querySelector('.pestana-acceso').classList.remove('activa');
                document.querySelectorAll('.pestana-acceso')[1].classList.add('activa');
                document.getElementById('contenidoLogin').classList.remove('activo');
                document.getElementById('contenidoRegistro').classList.add('activo');
            }
        }

        // --- AUTENTICACIÓN ---
        auth.onAuthStateChanged((usuario) => {
            if (usuario) {
                usuarioActual = usuario;
                document.getElementById('nombreUsuario').textContent = usuario.email;
                document.getElementById('nombreUsuario').style.display = 'inline';
                document.getElementById('btnAbrirAcceso').style.display = 'none';
                document.getElementById('btnCerrarSesion').style.display = 'inline';
            } else {
                usuarioActual = null;
                document.getElementById('nombreUsuario').style.display = 'none';
                document.getElementById('btnAbrirAcceso').style.display = 'inline';
                document.getElementById('btnCerrarSesion').style.display = 'none';
            }
        });

        function registrarUsuario() {
            const nombre = document.getElementById('regNombre').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            auth.createUserWithEmailAndPassword(email, pass)
            .then(() => {
                alert('✅ Cuenta creada exitosamente');
                cerrarModalAcceso();
            })
            .catch(error => {
                document.getElementById('mensajeAccesoError').textContent = '❌ ' + error.message;
            });
        }

        function iniciarSesion() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            auth.signInWithEmailAndPassword(email, pass)
            .then(() => {
                alert('✅ Sesión iniciada');
                cerrarModalAcceso();
            })
            .catch(error => {
                document.getElementById('mensajeAccesoError').textContent = '❌ ' + error.message;
            });
        }

        function cerrarSesion() {
            auth.signOut().then(() => {
                usuarioActual = null;
            });
        }

        // --- PUBLICAR OFERTA ---
        function publicarOferta() {
            const datos = {
                titulo: document.getElementById('titulo').value,
                caracteristicas: document.getElementById('caracteristicas').value,
                valor: document.getElementById('valor').value,
                contacto: document.getElementById('contacto').value,
                categoria: document.getElementById('categoria').value,
                fecha: Date.now(),
                usuario: usuarioActual.email
            };
            db.ref('publicaciones').push(datos)
            .then(() => {
                document.getElementById('mensajeExito').style.display = 'block';
                setTimeout(() => {
                    cerrarModal();
                    document.getElementById('mensajeExito').style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
