<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ofertas Santa Rosa</title>

<!-- Librerías Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f3f3;
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
}

.encabezado{
background:#056b1f;
color:white;
padding:18px 10px;
text-align:center;
}

.encabezado h1{
font-size:20px;
margin-bottom:5px;
}

.encabezado p{
font-size:12px;
margin-bottom:10px;
}

.btn-login{
background:white;
color:#056b1f;
border:none;
padding:9px 18px;
border-radius:12px;
font-size:13px;
font-weight:bold;
}

.menu{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:12px;
padding:12px;
}

.btn-menu{
width:100%;
max-width:270px;
padding:14px;
border-radius:16px;
background:white;
border:3px solid #056b1f;
font-size:15px;
font-weight:bold;
color:#056b1f;
}

.btn-publicar{
background:#e3c74b;
border:none;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
padding:15px;
}

.modal-contenido{
background:white;
max-width:350px;
margin:40px auto;
padding:20px;
border-radius:18px;
}

.modal h2{
font-size:18px;
margin-bottom:15px;
color:#056b1f;
}

input,textarea,select{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:12px;
border:1px solid #ccc;
font-size:14px;
}

.btn-enviar{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:#056b1f;
color:white;
font-weight:bold;
font-size:14px;
}

.cerrar{
float:right;
font-size:24px;
cursor:pointer;
}

.enlace-olvido{
text-align:center;
margin-top:10px;
color:#056b1f;
font-size:13px;
cursor:pointer;
text-decoration:underline;
}

</style>
</head>
<body>

<div class="encabezado">
<h1>Ofertas Santa Rosa</h1>
<p>Productos y servicios cerca de ti</p>

<button class="btn-login" onclick="abrirLogin()">
Iniciar Sesión
</button>
</div>

<div class="menu">

<button class="btn-menu" onclick="abrirCategoria('nuevos')">
✨ Productos nuevos
</button>

<button class="btn-menu" onclick="abrirCategoria('segunda')">
♻️ Productos segunda
</button>

<button class="btn-menu" onclick="abrirCategoria('servicios')">
🔧 Servicios
</button>

<button class="btn-menu btn-publicar" onclick="mostrarPublicar()">
📝 Publicar oferta
</button>

</div>

<!-- MODAL LOGIN / REGISTRO -->
<div class="modal" id="modalLogin">
<div class="modal-contenido">

<span class="cerrar" onclick="cerrarLogin()">×</span>

<h2>Iniciar sesión</h2>

<input type="email" id="loginEmail" placeholder="Correo">
<input type="password" id="loginPass" placeholder="Contraseña">

<button class="btn-enviar" onclick="iniciarSesion()">
Entrar
</button>

<p class="enlace-olvido" onclick="mostrarOlvido()">¿Olvidaste tu contraseña?</p>

<hr style="margin:18px 0;">

<h2>Crear cuenta</h2>

<input type="text" id="regNombre" placeholder="Nombre">
<input type="email" id="regEmail" placeholder="Correo">
<input type="password" id="regPass" placeholder="Contraseña (mínimo 6 caracteres)">

<button class="btn-enviar" onclick="registrarUsuario()">
Crear cuenta
</button>

</div>
</div>

<!-- MODAL RECUPERAR CONTRASEÑA -->
<div class="modal" id="modalOlvido">
<div class="modal-contenido">

<span class="cerrar" onclick="cerrarOlvido()">×</span>

<h2>Recuperar contraseña</h2>
<p style="font-size:13px; margin-bottom:15px;">Ingresa tu correo y te enviaremos un enlace para cambiar tu contraseña</p>

<input type="email" id="correoRecuperar" placeholder="Tu correo">

<button class="btn-enviar" onclick="enviarCorreoRecuperacion()">
Enviar enlace
</button>

</div>
</div>

<!-- MODAL PUBLICAR -->
<div class="modal" id="modalPublicar">
<div class="modal-contenido">

<span class="cerrar" onclick="cerrarPublicar()">×</span>

<h2>Publicar oferta</h2>

<input type="text" id="titulo" placeholder="Título">
<textarea id="caracteristicas" placeholder="Descripción"></textarea>
<input type="number" id="valor" placeholder="Precio">
<input type="text" id="contacto" placeholder="Contacto">

<select id="categoria">
<option value="nuevos">Productos nuevos</option>
<option value="segunda">Productos segunda</option>
<option value="servicios">Servicios</option>
</select>

<button class="btn-enviar" onclick="publicarOferta()">
Publicar
</button>

</div>
</div>

<script>
// CONFIGURACIÓN DE FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDy3wNIh44yWvQ0taoC-I1MiiLj9a77zpY",
  authDomain: "flasipromo.firebaseapp.com",
  databaseURL: "https://flasipromo-default-rtdb.firebaseio.com",
  projectId: "flasipromo",
  storageBucket: "flasipromo.firebasestorage.app",
  messagingSenderId: "439920052201",
  appId: "1:439920052201:web:ddf170b3be99b732cced78",
  measurementId: "G-LWKKN5ESQR"
};

// INICIALIZAR FIREBASE
firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();
let usuarioActual = null;

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

auth.onAuthStateChanged((usuario) => {
  usuarioActual = usuario;
});

// FUNCIONES
function abrirCategoria(categoria){
window.location.href=`categoria.html?categoria=${categoria}`;
}

function abrirLogin(){
document.getElementById('modalLogin').style.display='block';
}

function cerrarLogin(){
document.getElementById('modalLogin').style.display='none';
}

function mostrarOlvido(){
cerrarLogin();
document.getElementById('modalOlvido').style.display='block';
}

function cerrarOlvido(){
document.getElementById('modalOlvido').style.display='none';
}

function mostrarPublicar(){
if(usuarioActual){
document.getElementById('modalPublicar').style.display='block';
}else{
alert('Debes iniciar sesión primero');
}
}

function cerrarPublicar(){
document.getElementById('modalPublicar').style.display='none';
}

// REGISTRAR USUARIO
function registrarUsuario(){
const nombre = document.getElementById('regNombre').value;
const email = document.getElementById('regEmail').value;
const pass = document.getElementById('regPass').value;

if(pass.length < 6) return alert("La contraseña debe tener al menos 6 caracteres");

auth.createUserWithEmailAndPassword(email, pass)
.then((cred) => {
return db.ref('usuarios/' + cred.user.uid).set({
nombre: nombre,
correo: email,
fechaRegistro: firebase.database.ServerValue.TIMESTAMP
});
})
.then(() => {
alert("Cuenta creada correctamente");
cerrarLogin();
})
.catch((error) => {
alert("Error: " + error.message);
});
}

// INICIAR SESIÓN
function iniciarSesion(){
const email = document.getElementById('loginEmail').value;
const pass = document.getElementById('loginPass').value;

auth.signInWithEmailAndPassword(email, pass)
.then(() => {
alert("Sesión iniciada");
cerrarLogin();
})
.catch((error) => {
alert("Error: " + error.message);
});
}

// RECUPERAR CONTRASEÑA
function enviarCorreoRecuperacion(){
const email = document.getElementById('correoRecuperar').value;

if(!email) return alert("Ingresa tu correo");

auth.sendPasswordResetEmail(email)
.then(() => {
alert("Se ha enviado un enlace a tu correo");
cerrarOlvido();
})
.catch((error) => {
alert("Error: " + error.message);
});
}

// PUBLICAR OFERTA
function publicarOferta(){
if(!usuarioActual) return alert("Debes iniciar sesión");

const datos = {
titulo: document.getElementById('titulo').value,
descripcion: document.getElementById('caracteristicas').value,
precio: document.getElementById('valor').value,
contacto: document.getElementById('contacto').value,
categoria: document.getElementById('categoria').value,
autorId: usuarioActual.uid,
fecha: firebase.database.ServerValue.TIMESTAMP
};

db.ref('publicaciones').push(datos)
.then(() => {
alert("Oferta publicada");
cerrarPublicar();
});
}

</script>

</body>
</html>
